<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Простой видеозвонок</title>
    <style>
        /* ... (стили те же, что были) ... */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: #1a1a2e;
            color: white;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .controls {
            background: #16213e;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .controls input, .controls button {
            padding: 10px 15px;
            border-radius: 5px;
            border: none;
            font-size: 16px;
        }
        .controls input {
            flex: 1;
            min-width: 200px;
        }
        .controls button {
            background: #0f3460;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .controls button:hover {
            background: #e94560;
        }
        .videos {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .video-container {
            position: relative;
            background: #0f3460;
            border-radius: 10px;
            overflow: hidden;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 4 / 3;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: black;
        }
        .label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
        }
        .status {
            margin-top: 20px;
            text-align: center;
            padding: 10px;
            background: #16213e;
            border-radius: 10px;
        }
        @media (max-width: 700px) {
            .video-container {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="controls">
        <input type="text" id="roomId" placeholder="ID комнаты">
        <button id="createBtn">Создать звонок</button>
        <button id="joinBtn">Подключиться</button>
        <button id="hangupBtn" disabled>Завершить звонок</button>
        <button id="toggleAudioBtn" disabled>🔊 Выкл. микрофон</button>
        <button id="toggleVideoBtn" disabled>📹 Выкл. камеру</button>
    </div>
    <div class="videos">
        <div class="video-container">
            <video id="localVideo" autoplay muted playsinline></video>
            <div class="label">Вы</div>
        </div>
        <div class="video-container">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="label">Собеседник</div>
        </div>
    </div>
    <div class="status" id="status">Статус: инициализация...</div>
</div>

<!-- Firebase SDK -->
<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js"
        }
    }
</script>
<script type="module">
    import { initializeApp } from "firebase/app";
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, addDoc, getDocs } from "firebase/firestore";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "firebase/auth";

    const firebaseConfig = {
        apiKey: "AIzaSyA_c8w0JZv63nAqKmXPvwtpTyhZE3gvqTM",
        authDomain: "messenger-bdcf5.firebaseapp.com",
        projectId: "messenger-bdcf5",
        storageBucket: "messenger-bdcf5.firebasestorage.app",
        messagingSenderId: "453832820878",
        appId: "1:453832820878:web:e871089321db418e30a1df",
        measurementId: "G-RD3DV3JG5K"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const roomIdInput = document.getElementById('roomId');
    const createBtn = document.getElementById('createBtn');
    const joinBtn = document.getElementById('joinBtn');
    const hangupBtn = document.getElementById('hangupBtn');
    const toggleAudioBtn = document.getElementById('toggleAudioBtn');
    const toggleVideoBtn = document.getElementById('toggleVideoBtn');
    const statusDiv = document.getElementById('status');

    let localStream = null;
    let peerConnection = null;
    let currentRoomId = null;
    let currentUserId = null;
    let isCallActive = false;
    let audioEnabled = true;
    let videoEnabled = true;

    const configuration = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
        ]
    };

    // Аутентификация
    signInAnonymously(auth).catch(error => {
        console.error('Ошибка аутентификации:', error);
        statusDiv.textContent = 'Ошибка аутентификации. Проверьте настройки Firebase.';
    });

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUserId = user.uid;
            statusDiv.textContent = 'Вы вошли. Можете создать или присоединиться к звонку.';
            enableControls(true);
        } else {
            statusDiv.textContent = 'Не удалось войти. Обновите страницу.';
            enableControls(false);
        }
    });

    function enableControls(enabled) {
        createBtn.disabled = !enabled;
        joinBtn.disabled = !enabled;
        if (!enabled) {
            hangupBtn.disabled = true;
            toggleAudioBtn.disabled = true;
            toggleVideoBtn.disabled = true;
        }
    }

    async function getMedia() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localVideo.srcObject = stream;
            localStream = stream;
            return stream;
        } catch (err) {
            console.error('Ошибка доступа к медиа:', err);
            let msg = 'Не удалось получить доступ к камере/микрофону. ';
            if (err.name === 'NotFoundError') msg += 'Устройства не найдены.';
            else if (err.name === 'NotAllowedError') msg += 'Разрешение отклонено.';
            else msg += 'Проверьте настройки.';
            statusDiv.textContent = msg;
            throw err;
        }
    }

    async function createPeerConnection() {
        if (peerConnection) peerConnection.close();
        peerConnection = new RTCPeerConnection(configuration);
        if (localStream) {
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        }
        peerConnection.ontrack = (event) => {
            if (remoteVideo.srcObject !== event.streams[0]) {
                remoteVideo.srcObject = event.streams[0];
            }
        };
        peerConnection.onicecandidate = (event) => {
            if (event.candidate && currentRoomId) {
                saveIceCandidate(event.candidate);
            }
        };
        peerConnection.oniceconnectionstatechange = () => {
            console.log('ICE state:', peerConnection.iceConnectionState);
            if (peerConnection.iceConnectionState === 'disconnected' || peerConnection.iceConnectionState === 'failed') {
                statusDiv.textContent = 'Соединение разорвано.';
                hangup();
            }
        };
        return peerConnection;
    }

    async function saveIceCandidate(candidate) {
        if (!currentRoomId) return;
        const candidatesRef = collection(db, `calls/${currentRoomId}/candidates`);
        await addDoc(candidatesRef, {
            candidate: candidate.candidate,
            sdpMid: candidate.sdpMid,
            sdpMLineIndex: candidate.sdpMLineIndex,
            userId: currentUserId,
            timestamp: new Date()
        });
    }

    async function listenForIceCandidates(roomId) {
        const candidatesRef = collection(db, `calls/${roomId}/candidates`);
        return onSnapshot(candidatesRef, (snapshot) => {
            snapshot.docChanges().forEach(async (change) => {
                if (change.type === 'added') {
                    const data = change.doc.data();
                    if (data.userId !== currentUserId && peerConnection && data.candidate) {
                        try {
                            await peerConnection.addIceCandidate(new RTCIceCandidate(data));
                        } catch (e) {
                            console.error('Ошибка добавления ICE кандидата:', e);
                        }
                    }
                }
            });
        });
    }

    async function createOffer() {
        if (!peerConnection) return;
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        const offerRef = doc(db, `calls/${currentRoomId}/offers`, 'offer');
        await setDoc(offerRef, {
            sdp: peerConnection.localDescription.sdp,
            type: peerConnection.localDescription.type,
            userId: currentUserId,
            timestamp: new Date()
        });
        statusDiv.textContent = 'Ожидаем ответа...';
    }

    async function createAnswer() {
        if (!peerConnection) return;
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        const answerRef = doc(db, `calls/${currentRoomId}/answers`, 'answer');
        await setDoc(answerRef, {
            sdp: peerConnection.localDescription.sdp,
            type: peerConnection.localDescription.type,
            userId: currentUserId,
            timestamp: new Date()
        });
        statusDiv.textContent = 'Соединение устанавливается...';
    }

    async function listenForSignals(roomId, isInitiator) {
        if (!isInitiator) {
            const offerRef = doc(db, `calls/${roomId}/offers`, 'offer');
            return onSnapshot(offerRef, async (docSnap) => {
                if (docSnap.exists() && !peerConnection) {
                    const data = docSnap.data();
                    if (data.userId !== currentUserId) {
                        await createPeerConnection();
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(data));
                        await createAnswer();
                    }
                }
            });
        } else {
            const answerRef = doc(db, `calls/${roomId}/answers`, 'answer');
            return onSnapshot(answerRef, async (docSnap) => {
                if (docSnap.exists() && peerConnection && peerConnection.remoteDescription === null) {
                    const data = docSnap.data();
                    if (data.userId !== currentUserId) {
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(data));
                        statusDiv.textContent = 'Соединение установлено!';
                    }
                }
            });
        }
    }

    async function deleteRoom(roomId) {
        try {
            const candidatesSnapshot = await getDocs(collection(db, `calls/${roomId}/candidates`));
            for (const docSnap of candidatesSnapshot.docs) {
                await deleteDoc(docSnap.ref);
            }
            const offerDoc = doc(db, `calls/${roomId}/offers`, 'offer');
            await deleteDoc(offerDoc).catch(() => {});
            const answerDoc = doc(db, `calls/${roomId}/answers`, 'answer');
            await deleteDoc(answerDoc).catch(() => {});
            await deleteDoc(doc(db, 'calls', roomId));
        } catch (e) {
            console.error('Ошибка удаления комнаты:', e);
        }
    }

    async function hangup() {
        if (currentRoomId) {
            await deleteRoom(currentRoomId);
        }
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localVideo.srcObject = null;
            localStream = null;
        }
        remoteVideo.srcObject = null;
        isCallActive = false;
        currentRoomId = null;
        hangupBtn.disabled = true;
        toggleAudioBtn.disabled = true;
        toggleVideoBtn.disabled = true;
        statusDiv.textContent = 'Звонок завершён. Можете создать или подключиться к новому.';
        roomIdInput.value = '';
        enableControls(true);
    }

    async function startCall(roomId, isInitiator) {
        if (isCallActive) {
            await hangup();
        }
        currentRoomId = roomId;
        try {
            await getMedia();
            await createPeerConnection();

            const unsubscribeIce = await listenForIceCandidates(roomId);
            const unsubscribeSignal = await listenForSignals(roomId, isInitiator);

            if (isInitiator) {
                await createOffer();
            }

            isCallActive = true;
            hangupBtn.disabled = false;
            toggleAudioBtn.disabled = false;
            toggleVideoBtn.disabled = false;
            statusDiv.textContent = isInitiator ? 'Звонок создан. Отправьте ID другу.' : 'Подключаемся...';

            window.__unsubscribes = [unsubscribeIce, unsubscribeSignal];
        } catch (err) {
            console.error(err);
            let errorMsg = 'Ошибка при создании звонка. ';
            if (err.name === 'NotFoundError') {
                errorMsg += 'Не найдена камера или микрофон. Подключите устройство и разрешите доступ.';
            } else if (err.name === 'NotAllowedError') {
                errorMsg += 'Вы не разрешили доступ к камере/микрофону.';
            } else if (err.code === 'permission-denied') {
                errorMsg += 'Нет прав доступа к Firestore. Проверьте правила безопасности.';
            } else {
                errorMsg += 'Проверьте интернет и настройки Firestore.';
            }
            statusDiv.textContent = errorMsg;
            // Если звонок уже был активен, завершаем его, иначе просто выходим
            if (isCallActive) {
                await hangup();
            } else {
                // Очищаем частично созданные объекты
                if (peerConnection) {
                    peerConnection.close();
                    peerConnection = null;
                }
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                    localVideo.srcObject = null;
                    localStream = null;
                }
            }
        }
    }

    createBtn.onclick = async () => {
        if (!currentUserId) {
            statusDiv.textContent = 'Подождите, идёт вход...';
            return;
        }
        const roomId = generateRoomId();
        roomIdInput.value = roomId;
        try {
            await setDoc(doc(db, 'calls', roomId), {
                createdBy: currentUserId,
                createdAt: new Date(),
                active: true
            });
            await startCall(roomId, true);
        } catch (err) {
            console.error('Ошибка создания комнаты:', err);
            statusDiv.textContent = 'Ошибка создания комнаты. Проверьте правила Firestore.';
        }
    };

    joinBtn.onclick = async () => {
        if (!currentUserId) {
            statusDiv.textContent = 'Подождите, идёт вход...';
            return;
        }
        const roomId = roomIdInput.value.trim();
        if (!roomId) {
            statusDiv.textContent = 'Введите ID комнаты';
            return;
        }
        await startCall(roomId, false);
    };

    hangupBtn.onclick = async () => {
        await hangup();
    };

    toggleAudioBtn.onclick = () => {
        if (localStream) {
            audioEnabled = !audioEnabled;
            localStream.getAudioTracks().forEach(track => track.enabled = audioEnabled);
            toggleAudioBtn.textContent = audioEnabled ? "🔊 Выкл. микрофон" : "🔇 Вкл. микрофон";
        }
    };

    toggleVideoBtn.onclick = () => {
        if (localStream) {
            videoEnabled = !videoEnabled;
            localStream.getVideoTracks().forEach(track => track.enabled = videoEnabled);
            toggleVideoBtn.textContent = videoEnabled ? "📹 Выкл. камеру" : "📹 Вкл. камеру";
        }
    };

    function generateRoomId() {
        return Math.random().toString(36).substring(2, 8).toUpperCase();
    }
</script>
</body>
</html>
