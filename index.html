<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Аудиозвонок через Firebase</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #16213e;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #e94560;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        input, button {
            padding: 12px;
            border-radius: 30px;
            border: none;
            font-size: 16px;
            outline: none;
        }
        input {
            background: #0f3460;
            color: white;
            text-align: center;
        }
        button {
            background: #e94560;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }
        button:hover {
            background: #ff6b6b;
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            background: #0f3460;
            border-radius: 30px;
            font-size: 0.9rem;
        }
        .microphone-control {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .microphone-control button {
            flex: 1;
            background: #0f3460;
        }
        .microphone-control button:hover {
            background: #1a4a7a;
        }
        .call-id {
            font-weight: bold;
            background: #0f3460;
            padding: 10px;
            border-radius: 30px;
            margin: 15px 0;
            word-break: break-all;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎧 Аудиозвонок</h1>
    <div class="controls">
        <input type="text" id="roomId" placeholder="ID комнаты">
        <button id="createBtn">Создать звонок</button>
        <button id="joinBtn">Подключиться</button>
        <button id="hangupBtn" disabled>Завершить звонок</button>
    </div>
    <div class="microphone-control">
        <button id="toggleAudioBtn" disabled>🔊 Выкл. микрофон</button>
    </div>
    <div class="status" id="status">Статус: инициализация...</div>
</div>

<!-- Firebase SDK -->
<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js"
        }
    }
</script>
<script type="module">
    import { initializeApp } from "firebase/app";
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, addDoc, getDocs } from "firebase/firestore";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "firebase/auth";

    const firebaseConfig = {
        apiKey: "AIzaSyA_c8w0JZv63nAqKmXPvwtpTyhZE3gvqTM",
        authDomain: "messenger-bdcf5.firebaseapp.com",
        projectId: "messenger-bdcf5",
        storageBucket: "messenger-bdcf5.firebasestorage.app",
        messagingSenderId: "453832820878",
        appId: "1:453832820878:web:e871089321db418e30a1df",
        measurementId: "G-RD3DV3JG5K"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const roomIdInput = document.getElementById('roomId');
    const createBtn = document.getElementById('createBtn');
    const joinBtn = document.getElementById('joinBtn');
    const hangupBtn = document.getElementById('hangupBtn');
    const toggleAudioBtn = document.getElementById('toggleAudioBtn');
    const statusDiv = document.getElementById('status');

    let localStream = null;
    let peerConnection = null;
    let currentRoomId = null;
    let currentUserId = null;
    let isCallActive = false;
    let audioEnabled = true;
    let pendingIceCandidates = []; // буфер для ICE кандидатов до установки remote description

    const configuration = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
        ]
    };

    // --- Аутентификация ---
    signInAnonymously(auth).catch(error => {
        console.error('Ошибка аутентификации:', error);
        statusDiv.textContent = 'Ошибка аутентификации. Проверьте настройки Firebase.';
    });

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUserId = user.uid;
            statusDiv.textContent = '✅ Вы вошли. Можете создать или присоединиться к звонку.';
            enableControls(true);
        } else {
            statusDiv.textContent = '❌ Не удалось войти. Обновите страницу.';
            enableControls(false);
        }
    });

    function enableControls(enabled) {
        createBtn.disabled = !enabled;
        joinBtn.disabled = !enabled;
        if (!enabled) {
            hangupBtn.disabled = true;
            toggleAudioBtn.disabled = true;
        }
    }

    // Воспроизведение звука при подключении собеседника
    function playConnectSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.value = 800;
            gainNode.gain.value = 0.3;
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
            oscillator.stop(audioCtx.currentTime + 0.5);
        } catch (e) {
            console.warn('Не удалось воспроизвести звук', e);
        }
    }

    // --- Запрос доступа только к микрофону ---
    async function getMicrophone() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            localStream = stream;
            return stream;
        } catch (err) {
            console.error('Ошибка доступа к микрофону:', err);
            let msg = '❌ Не удалось получить доступ к микрофону. ';
            if (err.name === 'NotFoundError') msg += 'Микрофон не найден.';
            else if (err.name === 'NotAllowedError') msg += 'Разрешение отклонено.';
            else msg += 'Проверьте настройки.';
            statusDiv.textContent = msg;
            throw err;
        }
    }

    // Функция добавления ICE кандидата с буферизацией
    async function addIceCandidateWithBuffer(candidate) {
        if (!peerConnection) return;
        if (peerConnection.remoteDescription) {
            try {
                await peerConnection.addIceCandidate(candidate);
            } catch (e) {
                console.error('Ошибка добавления ICE кандидата:', e);
            }
        } else {
            // сохраняем в буфер
            pendingIceCandidates.push(candidate);
        }
    }

    async function flushPendingCandidates() {
        if (!peerConnection || !peerConnection.remoteDescription) return;
        const candidates = pendingIceCandidates.slice();
        pendingIceCandidates = [];
        for (const candidate of candidates) {
            try {
                await peerConnection.addIceCandidate(candidate);
            } catch (e) {
                console.error('Ошибка добавления ICE кандидата из буфера:', e);
            }
        }
    }

    // --- Создание peer connection (только аудио) ---
    async function createPeerConnection() {
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        peerConnection = new RTCPeerConnection(configuration);
        if (localStream) {
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });
        }
        peerConnection.ontrack = (event) => {
            const remoteAudio = new Audio();
            remoteAudio.srcObject = event.streams[0];
            remoteAudio.autoplay = true;
            remoteAudio.volume = 1.0;
            if (window._remoteAudio) {
                window._remoteAudio.pause();
                window._remoteAudio.srcObject = null;
            }
            window._remoteAudio = remoteAudio;
            // Проигрываем звук при получении удалённого потока (собеседник подключился)
            playConnectSound();
            statusDiv.textContent = '✅ Соединение установлено! Можно говорить.';
        };
        peerConnection.onicecandidate = (event) => {
            if (event.candidate && currentRoomId) {
                saveIceCandidate(event.candidate);
            }
        };
        peerConnection.oniceconnectionstatechange = () => {
            console.log('ICE state:', peerConnection.iceConnectionState);
            if (peerConnection.iceConnectionState === 'disconnected' || peerConnection.iceConnectionState === 'failed') {
                statusDiv.textContent = '⚠️ Соединение разорвано.';
                hangup();
            }
        };
        return peerConnection;
    }

    // --- Сохранение ICE кандидата в Firestore ---
    async function saveIceCandidate(candidate) {
        if (!currentRoomId) return;
        const candidatesRef = collection(db, `calls/${currentRoomId}/candidates`);
        await addDoc(candidatesRef, {
            candidate: candidate.candidate,
            sdpMid: candidate.sdpMid,
            sdpMLineIndex: candidate.sdpMLineIndex,
            userId: currentUserId,
            timestamp: new Date()
        });
    }

    // --- Прослушивание ICE кандидатов ---
    async function listenForIceCandidates(roomId) {
        const candidatesRef = collection(db, `calls/${roomId}/candidates`);
        return onSnapshot(candidatesRef, (snapshot) => {
            snapshot.docChanges().forEach(async (change) => {
                if (change.type === 'added') {
                    const data = change.doc.data();
                    if (data.userId !== currentUserId && peerConnection && data.candidate) {
                        const candidate = new RTCIceCandidate({
                            candidate: data.candidate,
                            sdpMid: data.sdpMid,
                            sdpMLineIndex: data.sdpMLineIndex
                        });
                        await addIceCandidateWithBuffer(candidate);
                    }
                }
            });
        });
    }

    // --- Создание offer (инициатор) ---
    async function createOffer() {
        if (!peerConnection) return;
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        const offerRef = doc(db, `calls/${currentRoomId}/offers`, 'offer');
        await setDoc(offerRef, {
            sdp: peerConnection.localDescription.sdp,
            type: peerConnection.localDescription.type,
            userId: currentUserId,
            timestamp: new Date()
        });
        statusDiv.textContent = '📞 Ожидаем ответа...';
    }

    // --- Создание answer (второй участник) ---
    async function createAnswer() {
        if (!peerConnection) return;
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        const answerRef = doc(db, `calls/${currentRoomId}/answers`, 'answer');
        await setDoc(answerRef, {
            sdp: peerConnection.localDescription.sdp,
            type: peerConnection.localDescription.type,
            userId: currentUserId,
            timestamp: new Date()
        });
        statusDiv.textContent = '🔊 Соединение устанавливается...';
        // После установки локального описания, если remoteDescription уже есть, пробуем добавить накопленные кандидаты
        await flushPendingCandidates();
    }

    // --- Слушаем сигналы (offer/answer) ---
    async function listenForSignals(roomId, isInitiator) {
        if (!isInitiator) {
            // Второй участник слушает offer
            const offerRef = doc(db, `calls/${roomId}/offers`, 'offer');
            return onSnapshot(offerRef, async (docSnap) => {
                if (docSnap.exists() && !peerConnection) {
                    const data = docSnap.data();
                    if (data.userId !== currentUserId) {
                        await createPeerConnection();
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(data));
                        // После установки remoteDescription пробуем добавить накопленные кандидаты
                        await flushPendingCandidates();
                        await createAnswer();
                    }
                }
            });
        } else {
            // Инициатор слушает answer
            const answerRef = doc(db, `calls/${roomId}/answers`, 'answer');
            return onSnapshot(answerRef, async (docSnap) => {
                if (docSnap.exists() && peerConnection && !peerConnection.remoteDescription) {
                    const data = docSnap.data();
                    if (data.userId !== currentUserId) {
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(data));
                        // После установки remoteDescription пробуем добавить накопленные кандидаты
                        await flushPendingCandidates();
                        statusDiv.textContent = '✅ Соединение установлено! Можно говорить.';
                        // Воспроизводим звук для инициатора
                        playConnectSound();
                    }
                }
            });
        }
    }

    // --- Удаление комнаты и всех данных ---
    async function deleteRoom(roomId) {
        try {
            const candidatesSnapshot = await getDocs(collection(db, `calls/${roomId}/candidates`));
            for (const docSnap of candidatesSnapshot.docs) {
                await deleteDoc(docSnap.ref);
            }
            const offerDoc = doc(db, `calls/${roomId}/offers`, 'offer');
            await deleteDoc(offerDoc).catch(() => {});
            const answerDoc = doc(db, `calls/${roomId}/answers`, 'answer');
            await deleteDoc(answerDoc).catch(() => {});
            await deleteDoc(doc(db, 'calls', roomId));
        } catch (e) {
            console.error('Ошибка удаления комнаты:', e);
        }
    }

    // --- Завершение звонка ---
    async function hangup() {
        if (currentRoomId) {
            await deleteRoom(currentRoomId);
        }
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        if (window._remoteAudio) {
            window._remoteAudio.pause();
            window._remoteAudio.srcObject = null;
            window._remoteAudio = null;
        }
        pendingIceCandidates = [];
        isCallActive = false;
        currentRoomId = null;
        hangupBtn.disabled = true;
        toggleAudioBtn.disabled = true;
        statusDiv.textContent = '📴 Звонок завершён. Можете создать или подключиться к новому.';
        roomIdInput.value = '';
        enableControls(true);
    }

    // --- Основная функция начала звонка ---
    async function startCall(roomId, isInitiator) {
        if (isCallActive) {
            await hangup();
        }
        currentRoomId = roomId;
        try {
            await getMicrophone();
            await createPeerConnection();

            const unsubscribeIce = await listenForIceCandidates(roomId);
            const unsubscribeSignal = await listenForSignals(roomId, isInitiator);

            if (isInitiator) {
                await createOffer();
            }

            isCallActive = true;
            hangupBtn.disabled = false;
            toggleAudioBtn.disabled = false;
            statusDiv.textContent = isInitiator ? '🎤 Звонок создан. Отправьте ID другу.' : '🔗 Подключаемся...';

            window.__unsubscribes = [unsubscribeIce, unsubscribeSignal];
        } catch (err) {
            console.error(err);
            let errorMsg = '❌ Ошибка при создании звонка. ';
            if (err.name === 'NotFoundError') {
                errorMsg += 'Микрофон не найден. Подключите устройство и разрешите доступ.';
            } else if (err.name === 'NotAllowedError') {
                errorMsg += 'Вы не разрешили доступ к микрофону.';
            } else if (err.code === 'permission-denied') {
                errorMsg += 'Нет прав доступа к Firestore. Проверьте правила безопасности.';
            } else {
                errorMsg += 'Проверьте интернет и настройки Firestore.';
            }
            statusDiv.textContent = errorMsg;
            if (isCallActive) {
                await hangup();
            } else {
                if (peerConnection) {
                    peerConnection.close();
                    peerConnection = null;
                }
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                    localStream = null;
                }
            }
        }
    }

    // --- Создание комнаты (инициатор) ---
    createBtn.onclick = async () => {
        if (!currentUserId) {
            statusDiv.textContent = '⏳ Подождите, идёт вход...';
            return;
        }
        const roomId = generateRoomId();
        roomIdInput.value = roomId;
        try {
            await setDoc(doc(db, 'calls', roomId), {
                createdBy: currentUserId,
                createdAt: new Date(),
                active: true
            });
            await startCall(roomId, true);
        } catch (err) {
            console.error('Ошибка создания комнаты:', err);
            statusDiv.textContent = '❌ Ошибка создания комнаты. Проверьте правила Firestore.';
        }
    };

    // --- Подключение к существующей комнате ---
    joinBtn.onclick = async () => {
        if (!currentUserId) {
            statusDiv.textContent = '⏳ Подождите, идёт вход...';
            return;
        }
        const roomId = roomIdInput.value.trim();
        if (!roomId) {
            statusDiv.textContent = '❌ Введите ID комнаты';
            return;
        }
        await startCall(roomId, false);
    };

    hangupBtn.onclick = async () => {
        await hangup();
    };

    toggleAudioBtn.onclick = () => {
        if (localStream) {
            audioEnabled = !audioEnabled;
            localStream.getAudioTracks().forEach(track => track.enabled = audioEnabled);
            toggleAudioBtn.textContent = audioEnabled ? "🔊 Выкл. микрофон" : "🔇 Вкл. микрофон";
        }
    };

    function generateRoomId() {
        return Math.random().toString(36).substring(2, 8).toUpperCase();
    }
</script>
</body>
</html>
