<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Аудиозвонок (упрощённый)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #16213e;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #e94560;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        input, button {
            padding: 12px;
            border-radius: 30px;
            border: none;
            font-size: 16px;
            outline: none;
        }
        input {
            background: #0f3460;
            color: white;
            text-align: center;
        }
        button {
            background: #e94560;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }
        button:hover {
            background: #ff6b6b;
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            background: #0f3460;
            border-radius: 30px;
            font-size: 0.9rem;
        }
        .microphone-control {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .microphone-control button {
            flex: 1;
            background: #0f3460;
        }
        .microphone-control button:hover {
            background: #1a4a7a;
        }
        .test-btn {
            background: #0f3460;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎧 Аудиозвонок (упрощённый)</h1>
    <div class="controls">
        <input type="text" id="roomId" placeholder="ID комнаты">
        <button id="createBtn">Создать звонок</button>
        <button id="joinBtn">Подключиться</button>
        <button id="hangupBtn" disabled>Завершить звонок</button>
        <button id="testBtn" class="test-btn">🔍 Проверить Firebase</button>
    </div>
    <div class="microphone-control">
        <button id="toggleAudioBtn" disabled>🔊 Выкл. микрофон</button>
    </div>
    <div class="status" id="status">Статус: инициализация...</div>
</div>

<!-- Firebase SDK -->
<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js"
        }
    }
</script>
<script type="module">
    import { initializeApp } from "firebase/app";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot, deleteDoc, updateDoc } from "firebase/firestore";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "firebase/auth";

    const firebaseConfig = {
        apiKey: "AIzaSyA_c8w0JZv63nAqKmXPvwtpTyhZE3gvqTM",
        authDomain: "messenger-bdcf5.firebaseapp.com",
        projectId: "messenger-bdcf5",
        storageBucket: "messenger-bdcf5.firebasestorage.app",
        messagingSenderId: "453832820878",
        appId: "1:453832820878:web:e871089321db418e30a1df",
        measurementId: "G-RD3DV3JG5K"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // DOM элементы
    const roomIdInput = document.getElementById('roomId');
    const createBtn = document.getElementById('createBtn');
    const joinBtn = document.getElementById('joinBtn');
    const hangupBtn = document.getElementById('hangupBtn');
    const toggleAudioBtn = document.getElementById('toggleAudioBtn');
    const statusDiv = document.getElementById('status');
    const testBtn = document.getElementById('testBtn');

    let localStream = null;
    let peerConnection = null;
    let currentRoomId = null;
    let currentUserId = null;
    let isCallActive = false;
    let audioEnabled = true;

    // Конфигурация STUN
    const configuration = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
        ]
    };

    // Вспомогательная функция для воспроизведения звука подключения
    function playConnectSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            oscillator.connect(gain);
            gain.connect(audioCtx.destination);
            oscillator.frequency.value = 880;
            gain.gain.value = 0.3;
            oscillator.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
            oscillator.stop(audioCtx.currentTime + 0.5);
            if (audioCtx.state === 'suspended') audioCtx.resume();
        } catch(e) { console.warn('Звук не воспроизведён', e); }
    }

    // --- Аутентификация ---
    signInAnonymously(auth).catch(error => {
        console.error('Auth error:', error);
        statusDiv.textContent = 'Ошибка аутентификации: ' + error.message;
    });

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUserId = user.uid;
            console.log('✅ Аутентификация успешна, UID:', currentUserId);
            statusDiv.textContent = '✅ Вы вошли. Можете создать или присоединиться.';
            enableControls(true);
        } else {
            console.log('❌ Не удалось войти');
            statusDiv.textContent = '❌ Не удалось войти. Обновите страницу.';
            enableControls(false);
        }
    });

    function enableControls(enabled) {
        createBtn.disabled = !enabled;
        joinBtn.disabled = !enabled;
        if (!enabled) {
            hangupBtn.disabled = true;
            toggleAudioBtn.disabled = true;
        }
    }

    // --- Получение микрофона ---
    async function getMicrophone() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            localStream = stream;
            console.log('🎤 Микрофон получен');
            return stream;
        } catch (err) {
            console.error('Ошибка микрофона:', err);
            statusDiv.textContent = '❌ Не удалось получить доступ к микрофону.';
            throw err;
        }
    }

    // --- Создание PeerConnection ---
    async function createPeerConnection() {
        if (peerConnection) peerConnection.close();
        peerConnection = new RTCPeerConnection(configuration);
        console.log('🔄 PeerConnection создан');

        if (localStream) {
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
                console.log('➕ Трек добавлен в PC');
            });
        }

        peerConnection.ontrack = (event) => {
            console.log('📡 Получен удалённый трек');
            const remoteAudio = new Audio();
            remoteAudio.srcObject = event.streams[0];
            remoteAudio.autoplay = true;
            remoteAudio.volume = 1.0;
            if (window._remoteAudio) window._remoteAudio.pause();
            window._remoteAudio = remoteAudio;
            playConnectSound();
            statusDiv.textContent = '✅ Соединение установлено! Можно говорить.';
        };

        peerConnection.onicecandidate = (event) => {
            if (event.candidate && currentRoomId) {
                console.log('🧊 ICE кандидат сгенерирован, сохраняем в Firestore');
                saveSignalToFirestore('candidate', event.candidate);
            }
        };

        peerConnection.oniceconnectionstatechange = () => {
            console.log('❄️ ICE состояние:', peerConnection.iceConnectionState);
            if (peerConnection.iceConnectionState === 'connected') {
                statusDiv.textContent = '✅ Соединение установлено!';
            } else if (peerConnection.iceConnectionState === 'disconnected' || peerConnection.iceConnectionState === 'failed') {
                statusDiv.textContent = '⚠️ Соединение разорвано.';
                hangup();
            }
        };

        return peerConnection;
    }

    // --- Сохранение сигнала (offer/answer/candidate) в Firestore ---
    async function saveSignalToFirestore(type, data) {
        if (!currentRoomId) return;
        const signalRef = doc(db, `calls/${currentRoomId}`);
        const fieldName = type === 'offer' ? 'offer' : (type === 'answer' ? 'answer' : 'candidates');
        try {
            if (type === 'candidate') {
                // Для кандидатов используем массив
                const docSnap = await getDoc(signalRef);
                const candidates = docSnap.exists() && docSnap.data().candidates ? docSnap.data().candidates : [];
                candidates.push({
                    candidate: data.candidate,
                    sdpMid: data.sdpMid,
                    sdpMLineIndex: data.sdpMLineIndex,
                    userId: currentUserId,
                    timestamp: Date.now()
                });
                await updateDoc(signalRef, { candidates });
            } else {
                await setDoc(signalRef, { [fieldName]: data }, { merge: true });
            }
            console.log(`📤 Сохранён ${type}`);
        } catch (e) {
            console.error(`Ошибка сохранения ${type}:`, e);
        }
    }

    // --- Слушаем сигналы из Firestore ---
    function listenForSignals(roomId, isInitiator) {
        const signalRef = doc(db, `calls/${roomId}`);
        return onSnapshot(signalRef, async (docSnap) => {
            if (!docSnap.exists()) return;
            const data = docSnap.data();
            console.log('📥 Получены сигналы:', Object.keys(data));

            // Обработка offer (если мы не инициатор)
            if (!isInitiator && data.offer && !peerConnection) {
                console.log('📞 Получен offer, создаём PC и отвечаем');
                if (data.offer.userId === currentUserId) return;
                await createPeerConnection();
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer.sdp));
                // Добавляем накопленные кандидаты (если есть)
                if (data.candidates) {
                    for (const cand of data.candidates) {
                        if (cand.userId !== currentUserId) {
                            try {
                                await peerConnection.addIceCandidate(new RTCIceCandidate(cand));
                            } catch(e) { console.warn('Ошибка добавления кандидата', e); }
                        }
                    }
                }
                // Создаём answer
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                await saveSignalToFirestore('answer', {
                    sdp: peerConnection.localDescription,
                    userId: currentUserId
                });
                statusDiv.textContent = '🔊 Соединение устанавливается...';
            }

            // Обработка answer (если мы инициатор)
            if (isInitiator && data.answer && peerConnection && peerConnection.remoteDescription === null) {
                console.log('📞 Получен answer, устанавливаем remote description');
                if (data.answer.userId === currentUserId) return;
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer.sdp));
                // Добавляем накопленные кандидаты
                if (data.candidates) {
                    for (const cand of data.candidates) {
                        if (cand.userId !== currentUserId) {
                            try {
                                await peerConnection.addIceCandidate(new RTCIceCandidate(cand));
                            } catch(e) { console.warn('Ошибка добавления кандидата', e); }
                        }
                    }
                }
                statusDiv.textContent = '✅ Соединение установлено!';
                playConnectSound();
            }

            // Обработка новых кандидатов (для уже существующего PC)
            if (peerConnection && data.candidates) {
                for (const cand of data.candidates) {
                    if (cand.userId !== currentUserId) {
                        try {
                            await peerConnection.addIceCandidate(new RTCIceCandidate(cand));
                        } catch(e) { console.warn('Ошибка добавления кандидата', e); }
                    }
                }
            }
        });
    }

    // --- Удаление комнаты ---
    async function deleteRoom(roomId) {
        try {
            await deleteDoc(doc(db, `calls/${roomId}`));
            console.log('🗑️ Комната удалена');
        } catch (e) {
            console.error('Ошибка удаления комнаты:', e);
        }
    }

    // --- Завершение звонка ---
    async function hangup() {
        console.log('🔚 Завершение звонка');
        if (currentRoomId) {
            await deleteRoom(currentRoomId);
        }
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        if (window._remoteAudio) {
            window._remoteAudio.pause();
            window._remoteAudio.srcObject = null;
            window._remoteAudio = null;
        }
        isCallActive = false;
        currentRoomId = null;
        hangupBtn.disabled = true;
        toggleAudioBtn.disabled = true;
        statusDiv.textContent = '📴 Звонок завершён.';
        roomIdInput.value = '';
        enableControls(true);
    }

    // --- Инициировать звонок (общий код) ---
    async function startCall(roomId, isInitiator) {
        if (isCallActive) await hangup();
        currentRoomId = roomId;
        try {
            await getMicrophone();
            await createPeerConnection();

            // Начинаем слушать сигналы
            const unsubscribe = listenForSignals(roomId, isInitiator);
            window._unsubscribe = unsubscribe;

            if (isInitiator) {
                // Создаём offer
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                await saveSignalToFirestore('offer', {
                    sdp: peerConnection.localDescription,
                    userId: currentUserId
                });
                statusDiv.textContent = '🎤 Звонок создан. Отправьте ID другу.';
                console.log('📤 Offer отправлен');
            } else {
                statusDiv.textContent = '🔗 Подключаемся...';
            }

            isCallActive = true;
            hangupBtn.disabled = false;
            toggleAudioBtn.disabled = false;
        } catch (err) {
            console.error('Ошибка startCall:', err);
            statusDiv.textContent = '❌ Ошибка: ' + err.message;
            await hangup();
        }
    }

    // --- Создание комнаты (инициатор) ---
    createBtn.onclick = async () => {
        if (!currentUserId) {
            statusDiv.textContent = '⏳ Подождите, идёт вход...';
            return;
        }
        const roomId = generateRoomId();
        roomIdInput.value = roomId;
        try {
            // Создаём документ комнаты (просто для инициализации)
            await setDoc(doc(db, `calls/${roomId}`), {
                createdBy: currentUserId,
                createdAt: Date.now(),
                active: true
            });
            await startCall(roomId, true);
        } catch (err) {
            console.error('Ошибка создания комнаты:', err);
            statusDiv.textContent = '❌ Ошибка создания комнаты. Проверьте правила Firestore.';
        }
    };

    // --- Подключение к существующей комнате ---
    joinBtn.onclick = async () => {
        if (!currentUserId) {
            statusDiv.textContent = '⏳ Подождите, идёт вход...';
            return;
        }
        const roomId = roomIdInput.value.trim();
        if (!roomId) {
            statusDiv.textContent = '❌ Введите ID комнаты';
            return;
        }
        // Проверяем, существует ли комната
        const roomRef = doc(db, `calls/${roomId}`);
        const roomSnap = await getDoc(roomRef);
        if (!roomSnap.exists()) {
            statusDiv.textContent = '❌ Комната не существует. Проверьте ID.';
            return;
        }
        await startCall(roomId, false);
    };

    hangupBtn.onclick = async () => {
        await hangup();
    };

    toggleAudioBtn.onclick = () => {
        if (localStream) {
            audioEnabled = !audioEnabled;
            localStream.getAudioTracks().forEach(track => track.enabled = audioEnabled);
            toggleAudioBtn.textContent = audioEnabled ? "🔊 Выкл. микрофон" : "🔇 Вкл. микрофон";
        }
    };

    // --- Проверка подключения к Firebase ---
    testBtn.onclick = async () => {
        try {
            statusDiv.textContent = 'Проверка...';
            const testRef = doc(db, 'test', 'connection');
            await setDoc(testRef, { timestamp: Date.now() });
            const testSnap = await getDoc(testRef);
            if (testSnap.exists()) {
                statusDiv.textContent = '✅ Firebase работает! Правила разрешают запись.';
                console.log('Firebase test success');
            } else {
                statusDiv.textContent = '⚠️ Firebase доступен, но тестовый документ не найден.';
            }
            await deleteDoc(testRef);
        } catch (err) {
            console.error('Firebase test error:', err);
            statusDiv.textContent = '❌ Ошибка Firebase: ' + err.message + '. Проверьте правила Firestore и аутентификацию.';
        }
    };

    function generateRoomId() {
        return Math.random().toString(36).substring(2, 8).toUpperCase();
    }
</script>
</body>
</html>
